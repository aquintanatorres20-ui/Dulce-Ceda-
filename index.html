<!DOCTYPE html>
<html>
<head>
    <title>Cafeteria Dulce & Ceda</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<h1> Cafeteria Dulce & Ceda</h1>
<p>Dulce como el amor, suave como la seda</p>

     <section>
    <h2>Menú</h2>

    <div class="menu">

        <div class="card">
            <img src="img/torta.jpg">
            <p> Torta de chocolate</p>
            <p>$20.000</p>
            <button onlick="Agregar('torta', 20000)">Agregar</button>
        </div>

        <div class="card">
            <img src="img/galletas.jpg">
            <p> Galletas</p>
            <p>$20.000</p>
            <button onlick="Agregar('galletas', 20000)">Agregar</button>
        </div>

        <div class="card">
            <img src="img/cafe.jpg">
            <p> Café</p>
            <p>$10.000</p>
            <button onlick="Agregar('cafe', 10000)">Agregar</button>
        </div>

    </div>
</section>

<h2>Haz tu pedido</h2>
<form>
    <input type="text" placeholder="Tu nombre">
    <input type="text" placeholder="Producto">
    <button>Enviar</button>
</form>

</body>
<nav class="navbar">
    <h2>☕ Dulce & Seda</h2>
    <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Menú</a></li>
        <li><a href="#">Pedidos</a></li>
    </ul>
</nav>
<a href="https://wa.me/573185954290" class="whatsapp" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>
<button onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
<script>
let carrito = [];
let total = 0;

function agregar(nombre, precio) {
    carrito.push(nombre);
    total += precio;

    document.getElementById("lista").innerHTML = carrito.join("<br>");
    document.getElementById("total").innerText = "Total: $" + total;
}

function enviarPedido() {
    let mensaje = "Hola, quiero hacer un pedido:%0A";

    carrito.forEach(producto => {
        mensaje += "- " + producto + "%0A";
    });

    mensaje += "%0ATotal: $" + total;

    let numero = "573185954290";

    let url = "https://wa.me/" + numero + "?text=" + mensaje;

    window.open(url, "_blank");
}
</script>

</body>
</html>
